# ==========================================
# 果冻影院 2.0 共享配置 (脱敏版本)
# 此文件可上传到 Nacos 配置中心
# ==========================================

# 腾讯云对象存储配置
cos:
  client:
    host: https://buk-1-1365645108.cos.ap-beijing.myqcloud.com
    region: ap-beijing
    bucket: buk-1-1365645108
    app-id: 1365645108

# AI 多提供商配置
ai:
  enable: true
  
  providers:
    # SiliconFlow AI（主要提供商）
    - name: siliconflow
      priority: 1
      enabled: true
      base-url: https://api.siliconflow.cn/v1
      model: deepseek-ai/DeepSeek-V3
      temperature: 0.7
      max-tokens: 2000
      timeout: 60
      
    # DeepSeek AI（备用提供商）
    - name: deepseek
      priority: 2
      enabled: true
      base-url: https://api.deepseek.com
      model: deepseek-chat
      temperature: 0.7
      max-tokens: 2000
      timeout: 60
      
  # 故障转移配置
  failover:
    failure-threshold: 5
    timeout: 60
    health-check-interval: 30
    retry-count: 3
    retry-interval: 1000
  cache:
    enable: true
    default-ttl-seconds: 1800
    summary-ttl-seconds: 21600
    search-ttl-seconds: 900
  rate-limit:
    enable: true
    per-minute: 30

search:
  elasticsearch:
    enable: false
    base-url: http://127.0.0.1:9200
    media-index: jelly_media

tvbox:
  enable: true
  base-url: http://127.0.0.1:3001
  ingest-limit: 20

rag:
  enable: true
  auto-bootstrap: true
  rebuild-on-startup: false
  bootstrap-batch-size: 100
  postgres:
    enable: true
    url: jdbc:postgresql://127.0.0.1:5432/jelly_cinema_rag
    username: postgres
    password: ${RAG_POSTGRES_PASSWORD:AiInfra@123}
    driver-class-name: org.postgresql.Driver
  milvus:
    enable: true
    host: 127.0.0.1
    port: 19530
    database-name: default
    connect-timeout-ms: 5000
    rpc-deadline-ms: 30000
    load-timeout-ms: 30000
  embedding:
    provider: hashing
    dimension: 256
  chunking:
    chunk-size: 260
    chunk-overlap: 40
    max-comment-chunks-per-media: 20
  retrieval:
    search-top-k: 8
    qa-top-k: 6
    lexical-weight: 0.58
    vector-weight: 0.42
    max-citations: 5
    fallback-to-mysql: true
  collections:
    media-profile: rag_media_profile_chunk_v1
    comment-qa: rag_comment_chunk_v1
    external-media: rag_external_media_chunk_v1
